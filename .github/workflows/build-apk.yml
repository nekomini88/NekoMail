name: Build NekoMail APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept licenses
      run: yes | sdkmanager --licenses

    - name: Install build tools & platform
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Build debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: NekoMail
        path: app/build/outputs/apk/debug/NekoMail.apk

    - name: Debug and Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
        GH_REPO: ${{ github.repository }}
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        echo "Tag: $TAG"
        echo "Token length: ${#GH_TOKEN}"
        gh auth status 2>&1
        echo "---"
        gh release create "$TAG" \
          app/build/outputs/apk/debug/NekoMail.apk \
          --title "NekoMail $TAG" \
          --notes "Automated build from $TAG" \
          --latest 2>&1